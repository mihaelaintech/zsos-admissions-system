{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="ZSOS Logo" class="auth-logo">

        <h1 class="auth-title">ACCESS YOUR ACCOUNT</h1>
        <p class="auth-subtitle">Student Portal</p>
        <p class="auth-helper-text">Use your generated credentials to log in.</p>

        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="Student username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="auth-btn">Log in</button>
        </form>

        <div class="auth-links">
            <a href="{{ url_for('register') }}">Don’t have an account? Sign up here</a>
            <a href="{{ url_for('home') }}">Back to portal selection</a>
        </div>
    </div>
</div>
{% endblock %}
